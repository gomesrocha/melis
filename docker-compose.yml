# Melis AI Gateway - Local Development Environment
# Usage: docker compose up --build

services:
  melis-gateway:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./routes.yaml:/app/routes.yaml:ro
    environment:
      - MELIS_ROUTES_CONFIG=/app/routes.yaml
      - MELIS_REDIS_URL=redis://redis:6379
      - RUST_LOG=info
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "/app/melis-gateway", "--healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
